<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — MUSILAB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Syne:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../setup/static/style/styles.css" />
</head>
<body>

  <div class="auth-page">

    <!-- ── VISUAL SIDE ──────────────────────────────── -->
    <div class="auth-visual">
      <div class="auth-visual-bg">
        <div class="auth-orb auth-orb-1"></div>
        <div class="auth-orb auth-orb-2"></div>
        <div class="auth-orb auth-orb-3"></div>
      </div>

      <div class="auth-visual-content">
        <a href="index.html" class="auth-logo">
          <img src="../setup/static/assets/logo-musilab.png" alt="MUSILAB" class="auth-logo-img" />
          <span>MUSI<em>LAB</em></span>
        </a>

        <p class="auth-quote">
          "A música é a linguagem<br>da emoção."
        </p>
        <p class="auth-quote-by">— Immanuel Kant</p>

        <div class="auth-dots">
          <div class="auth-dot active"></div>
          <div class="auth-dot"></div>
          <div class="auth-dot"></div>
        </div>
      </div>
    </div>

    <!-- ── FORM SIDE ────────────────────────────────── -->
    <div class="auth-form-side">
      <div class="auth-form-wrap">

        <h1 class="auth-form-title">Bem-vindo<br>de volta.</h1>
        <p class="auth-form-subtitle">
          Ainda não tem conta?
          <a href="register.html">Cadastre-se gratuitamente</a>
        </p>

        <form id="login-form" novalidate>

          <div class="form-group">
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="email"
              autocomplete="email"
            />
            <label for="email" class="form-label">E-mail</label>
            <span class="form-hint">Informe um e-mail válido.</span>
          </div>

          <div class="form-group pw-wrap">
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="senha"
              autocomplete="current-password"
            />
            <label for="password" class="form-label">Senha</label>
            <button type="button" class="pw-toggle" aria-label="Mostrar senha">👁</button>
            <span class="form-hint">Informe sua senha.</span>
          </div>

          <div style="display:flex;justify-content:flex-end;margin-bottom:24px;margin-top:-8px;">
            <a href="#" style="font-size:13px;color:var(--brand);text-decoration:none;transition:color .2s;"
               onmouseover="this.style.color='var(--hover)'" onmouseout="this.style.color='var(--brand)'">
              Esqueci minha senha
            </a>
          </div>

          <button type="submit" class="form-submit">
            <span class="submit-text">Entrar</span>
            <span class="submit-icon">→</span>
          </button>

        </form>

        <div class="form-divider"><span>ou continue com</span></div>

        <div style="display:flex;gap:12px;">
          <button type="button" class="btn btn-secondary" style="flex:1;justify-content:center;padding:14px;font-size:13px;border-radius:var(--radius-md);">
            Google
          </button>
          <button type="button" class="btn btn-secondary" style="flex:1;justify-content:center;padding:14px;font-size:13px;border-radius:var(--radius-md);">
            Facebook
          </button>
        </div>

      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="../setup/static/assets/auth.js"></script>
</body>
</html>
